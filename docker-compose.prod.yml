# =============================================================================
# PRODFLOW AI - PRODUCTION DOCKER COMPOSE CONFIGURATION
# =============================================================================

version: '3.8'

services:
  # AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: prodflow-ai-service-prod
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - ENVIRONMENT=production
      - CORS_ORIGINS=["https://prodflowaii.vercel.app", "https://prodflow-6rmm.onrender.com"]
      - LOG_LEVEL=INFO
    expose:
      - "8000"
    volumes:
      - ./ai-service/logs:/app/logs
    networks:
      - prodflow-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prodflow-backend-prod
    restart: unless-stopped
    environment:
      - PORT=5000
      - NODE_ENV=production
      - HOST=0.0.0.0
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=7d
      - AI_SERVICE_URL=https://prodflow-2w53.onrender.com
      - FRONTEND_URL=https://prodflowaii.vercel.app
      - BCRYPT_ROUNDS=12
      - TRUST_PROXY=true
    expose:
      - "5000"
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      ai-service:
        condition: service_healthy
    networks:
      - prodflow-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=https://${BACKEND_DOMAIN}/api
        - VITE_AI_SERVICE_URL=https://${AI_SERVICE_DOMAIN}
        - VITE_NODE_ENV=production
    container_name: prodflow-frontend-prod
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - prodflow-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Reverse Proxy (Nginx)
  nginx:
    image: nginx:alpine
    container_name: prodflow-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
      - ai-service
    networks:
      - prodflow-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  prodflow-network:
    driver: bridge